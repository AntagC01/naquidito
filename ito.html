<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Números</title>
    <link rel="stylesheet" href="css/ito.css">
</head>

<body>

    <div class="container">
        <h1>Gerador de numeros</h1>

        <div class="config">
            <label for="qtdNumeros">Quantidade:</label>
            <input type="number" id="qtdNumeros" min="1" max="100" value="5">
        </div>
        <button id="btnGerar">Gerar Números</button>

        <div id="contador">1/5</div>

        <div id="numero" class="oculto">?</div>

        <div class="botoes">
            <button id="btnMostrar">Mostrar</button>
            <button id="btnAnterior">⬅ Anterior</button>
            <button id="btnProximo">Próximo ➡</button>
        </div>

        <button id="btnRevelarTodos">Revelar Todos</button>

        <div id="todosNumeros"></div>
        <a href="index.html">DUCK DUCK</a>
    </div>

    <script src="js/ito.js"></script>
</body>

</html>
